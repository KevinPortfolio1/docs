<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人靜態網頁 - 雙欄版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">Portfolio 2026</div>
        <ul>
            <li><a href="#about">關於</a></li>
            <li><a href="#main-content">核心內容</a></li>
        </ul>
    </nav>

    <header id="about">
        <div class="hero-content">
            <h1>Software Developer</h1>
            <p>專注於系統設計、程式重構與 DevOps 實踐</p>
        </div>
    </header>

    <main id="main-content" class="split-layout">
        
        <aside class="left-panel">
            <section id="skills">
                <h2>專業技能</h2>
                <div class="skill-container">
                    <div class="skill-card">HTML / CSS</div>
                    <div class="skill-card">JavaScript</div>
                    <div class="skill-card">System Design</div>
                    <div class="skill-card">Refactoring</div>
                    <div class="skill-card">DevOps</div>
                </div>
            </section>
        </aside>

        <article class="right-panel">
            <section id="projects">
                <h2>專案展示</h2>
                <div class="project-grid">
                    <div class="project-item">
                        <h3>Core System</h3>
                        <p>核心系統模組設計與實作。</p>
                    </div>
                    <div class="project-item">
                        <h3>Refactoring Practice</h3>
                        <p>既有程式碼重構實踐。</p>
                    </div>
                    <div class="project-item">
                        <h3>DevOps Pipeline</h3>
                        <p>CI/CD 流程自動化部署。</p>
                    </div>
                </div>
            </section>
        </article>

    </main>

    <footer>
        <p>&copy; 2026 04 09</p>
    </footer>
