<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer System - 氣象監測儀表板</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="changeall.js" defer></script> 
</head> 
<body class="bg-light"> 

	<nav class="navbar navbar-expand-lg navbar-white bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#">個人靜態網頁</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link fw-semibold" href="/">首頁</a>
                <a class="nav-link btn btn-primary text-white px-4 ms-lg-3" href="#main-app">進入系統</a>
            </div>
        </div>
    </nav>

    <header id="hero-screen" class="d-flex align-items-center justify-content-center text-center text-white">
        <div class="container">
            <h1 class="display-1 fw-bold mb-3">SYSTEM DESIGNER</h1>
            <p class="lead mb-5 opacity-75">探索自動化、重構與 DevOps 的極限</p>
            <button id="start-btn" class="btn btn-light btn-lg px-5 py-3 fw-bold rounded-pill shadow">技術頁面</button></div>
    </header>

    <main id="main-app">
        <div class="container-fluid p-0 h-100">
            <div class="row g-0 h-100">
                
                <aside class="col-lg-3 col-xl-2 bg-dark text-white p-4 side-panel">
                    <h6 class="text-secondary text-uppercase small fw-bold mb-4">Dashboard</h6>
                    <div class="list-group list-group-flush" id="menu-list">
                        <a href="javascript:void(0)" data-target="about-section" class="list-group-item list-group-item-action bg-transparent text-white border-0 py-3 active">按鈕更改</a>
                        <a href="javascript:void(0)" data-target="skills-section" class="list-group-item list-group-item-action bg-transparent text-white border-0 py-3">動態更改 抓取資料</a>
                        <a href="javascript:void(0)" data-target="projects-section" class="list-group-item list-group-item-action bg-transparent text-white border-0 py-3">動態更改 圖形顯示</a>
                    </div>
                </aside>

                <article class="col-lg-9 col-xl-10 p-5 bg-white content-area">
                    
                    <section id="about-section" class="content-section active">
                        <div class="card border-0 shadow-sm p-4 rounded-4">
                            <h2>標題</h2>
                            <p id="about-time-display">透過 JavaScript 動態切換的內容... 本頁面展示基礎樣式切換。</p>
                        </div>
                    </section>

                    <section id="skills-section" class="content-section">
                        <div class="card border-0 shadow-sm p-4 rounded-4">
                            <h2>內容</h2>
                            <div id="about-time-display2">透過 JavaScript 動態切換的內容... 此區塊可用於顯示詳細文字資料。</div>
                        </div>
                    </section>

                    <section id="projects-section" class="content-section">
                        <div class="card border-0 shadow-sm p-4 rounded-4">
                             <h2 class="mb-4">台北即時氣象監測</h2>
                             <p class="text-muted small">資料來源：Open-Meteo API</p>
                             
                             <div class="row g-4">
                                <div class="col-xl-8">
                                    <div class="p-3 border rounded-3 bg-light">
                                        <h5 class="text-secondary mb-3">24小時溫度預報 (°C)</h5>
                                        <div style="position: relative; height: 350px;">
                                            <canvas id="tempChart"></canvas>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-xl-4">
                                    <div class="p-3 border rounded-3 bg-light">
                                        <h5 class="text-secondary mb-3">空氣品質 (PM2.5)</h5>
                                        <div style="position: relative; height: 350px;">
                                            <canvas id="aqiChart"></canvas>
                                        </div>
                                    </div>
                                </div>
                             </div>
                             <div class="mt-4 p-3 bg-primary bg-opacity-10 rounded-3 border-start border-primary border-4">
                                 <div id="sun-info" class="mb-0 fw-bold text-primary">正在載入天文數據...</div>
                             </div>
                        </div>
                    </section>
                </article>
            </div>
        </div>
    </main>

    <footer class="bg-white border-top py-4 text-center text-muted">
        <small>&copy; 2026 Developer System | Taipei Weather Monitor</small>
    </footer>

</body>
</html>
